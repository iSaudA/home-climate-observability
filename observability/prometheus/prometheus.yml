global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]

  - job_name: home-assistant
    metrics_path: /api/prometheus
    authorization:
      type: Bearer
      credentials_file: /run/secrets/home_assistant_token
    static_configs:
      - targets: [climate-host:8123]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
