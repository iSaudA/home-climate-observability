name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create non-secret validation fixtures
        run: |
          printf 'validation-token\n' > secrets/home_assistant_token
          printf 'validation-password\n' > secrets/grafana_admin_password
          chmod 600 secrets/home_assistant_token secrets/grafana_admin_password
      - name: Validate Compose projects
        env:
          HOST_IP: 192.0.2.1
          GRAFANA_BIND_ADDRESS: 127.0.0.1
        run: |
          docker compose -f home-automation/compose.yaml config --quiet
          docker compose -f observability/compose.yaml config --quiet
          docker compose config --quiet
      - name: Validate Prometheus configuration and rules
        run: |
          docker run --rm -v "$PWD/observability/prometheus:/etc/prometheus:ro" -v "$PWD/secrets/home_assistant_token:/run/secrets/home_assistant_token:ro" --entrypoint promtool prom/prometheus:v3.11.0 check config /etc/prometheus/prometheus.yml
          docker run --rm -v "$PWD/observability/prometheus/rules:/rules:ro" --entrypoint promtool prom/prometheus:v3.11.0 check rules /rules/climate.yml /rules/infrastructure.yml
      - name: Validate dashboards
        run: |
          find observability/grafana/dashboards -name '*.json' -print0 | xargs -0 -n1 jq -e . >/dev/null
          docker run --rm -v "$PWD/observability/grafana/provisioning:/work:ro" mikefarah/yq:4.45.4 eval-all 'true' /work/datasources/prometheus.yml /work/dashboards/dashboards.yml >/dev/null
      - name: Run ShellCheck
        run: shellcheck scripts/*.sh
      - name: Check Home Assistant configuration
        run: docker run --rm -v "$PWD/home-automation/config:/config" ghcr.io/home-assistant/home-assistant:2026.5.4 python -m homeassistant --script check_config --config /config
